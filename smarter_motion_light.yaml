blueprint:
  name: "Motion-activated Light with Illuminance and Sun"
  description: >
    Turn on a light when motion is detected, with optional gating by
    ambient illuminance and/or sun position. By default, during daytime
    the light only turns on if the room is dim; during dusk, night, and
    dawn, motion always turns the light on. Both gates can be disabled
    individually to simplify the behavior. Optional smooth transitions
    for turn-on and turn-off.

    A stale-lights timeout turns off lights that were left on by an
    external source (schedule, manual) after the room has been empty
    for the configured duration, with an automatic retry if the first
    command is dropped.
  domain: automation
  author: artogahr
  source_url: https://github.com/artogahr/smarter-motion-light/blob/main/smarter_motion_light.yaml
  input:
    motion_entity:
      name: Motion Sensor
      description: Binary sensor that triggers the light.
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor
    light_target:
      name: Light
      description: Light or group of lights to control.
      selector:
        target:
          entity:
            domain: light

    sun_gating:
      name: Use sun gating
      description: >
        When enabled, the illuminance check only applies during daytime.
        During dusk, night, and dawn, motion always turns the light on
        (illuminance is ignored). When disabled, illuminance gating (if
        enabled) applies 24 hours a day.
      default: true
      selector:
        boolean:
    sunrise_offset_minutes:
      name: Sunrise offset (minutes)
      description: >
        How many minutes after sunrise the "daytime" window starts.
        Larger values delay the start of daytime. Only used if sun
        gating is enabled.
      default: 60
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: minutes
    sunset_offset_minutes:
      name: Sunset offset (minutes)
      description: >
        How many minutes before sunset the "daytime" window ends.
        Larger values end daytime earlier. Only used if sun gating is
        enabled.
      default: 60
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: minutes

    lux_gating:
      name: Use illuminance gating
      description: >
        When enabled, the light only turns on if the illuminance sensor
        reads below the threshold. When disabled, motion alone is
        enough (subject to sun gating if that is also enabled).
      default: true
      selector:
        boolean:
    illuminance_entity:
      name: Illuminance Sensor
      description: >
        Only used if illuminance gating is enabled. Pick any sensor
        with device_class "illuminance" (for example the lux sensor
        on a presence device).
      default:
      selector:
        entity:
          filter:
            - device_class: illuminance
              domain: sensor
    illuminance_threshold:
      name: Illuminance Threshold
      description: >
        If illuminance is at or above this value, the light will not
        turn on. Only used if illuminance gating is enabled.
      default: 60
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: lx

    use_transitions:
      name: Use smooth transitions
      description: >
        When enabled, the light fades on and off over the configured
        durations. Requires bulbs that support the transition parameter.
      default: true
      selector:
        boolean:
    turn_on_transition:
      name: Turn-on transition
      description: Seconds over which to fade the light on.
      default: 2
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
          unit_of_measurement: seconds
    turn_off_transition:
      name: Turn-off transition
      description: Seconds over which to fade the light off.
      default: 5
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
          unit_of_measurement: seconds

    no_motion_wait:
      name: Wait time
      description: Seconds to leave the light on after motion clears.
      default: 10
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

    stale_timeout:
      name: Stale lights timeout
      description: >
        If the room has been empty for this many seconds and lights are
        still on (e.g. turned on by a schedule or manually), they will
        be turned off automatically. Should be set higher than the wait
        time above. Set to 0 to disable.
      default: 600
      selector:
        number:
          min: 0
          max: 7200
          unit_of_measurement: seconds

mode: restart
max_exceeded: silent

variables:
  sun_gating: !input sun_gating
  lux_gating: !input lux_gating
  illuminance_entity: !input illuminance_entity
  illuminance_threshold: !input illuminance_threshold
  sunrise_offset_minutes: !input sunrise_offset_minutes
  sunset_offset_minutes: !input sunset_offset_minutes
  use_transitions: !input use_transitions
  turn_on_transition: !input turn_on_transition
  turn_off_transition: !input turn_off_transition
  stale_timeout: !input stale_timeout

triggers:
  - trigger: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"
    id: motion_on
  - trigger: state
    entity_id: !input motion_entity
    to: "off"
    for:
      seconds: !input stale_timeout
    id: motion_stale

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_on
        sequence:
          - condition: template
            value_template: >
              {% set is_day = is_state('sun.sun', 'above_horizon') %}
              {% set sunrise_ts = as_timestamp(state_attr('sun.sun', 'next_rising')) %}
              {% set sunset_ts = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
              {% set now_ts = as_timestamp(now()) %}
              {% if is_day %}
                {# Sun is up: next_rising is tomorrow, so today's sunrise was sunrise_ts - 86400 #}
                {% set last_sunrise_ts = sunrise_ts - 86400 %}
                {% set daytime_start = last_sunrise_ts + (sunrise_offset_minutes * 60) %}
                {% set daytime_end = sunset_ts - (sunset_offset_minutes * 60) %}
                {% set in_daytime_window = now_ts >= daytime_start and now_ts <= daytime_end %}
              {% else %}
                {% set in_daytime_window = false %}
              {% endif %}

              {% if sun_gating and not in_daytime_window %}
                true
              {% elif lux_gating %}
                {% if illuminance_entity in [none, ''] %}
                  false
                {% else %}
                  {{ states(illuminance_entity) | float(9999) < illuminance_threshold }}
                {% endif %}
              {% else %}
                true
              {% endif %}
          - alias: "Turn on the light"
            action: light.turn_on
            target: !input light_target
            data: >
              {{ {'transition': turn_on_transition} if use_transitions else {} }}
          - alias: "Wait until there is no motion from device"
            wait_for_trigger:
              trigger: state
              entity_id: !input motion_entity
              from: "on"
              to: "off"
          - alias: "Wait the number of seconds that has been set"
            delay: !input no_motion_wait
          - alias: "Turn off the light"
            action: light.turn_off
            target: !input light_target
            data: >
              {{ {'transition': turn_off_transition} if use_transitions else {} }}
          - delay:
              seconds: 5
          - alias: "Turn off the light (retry)"
            action: light.turn_off
            target: !input light_target
            data: >
              {{ {'transition': turn_off_transition} if use_transitions else {} }}

      - conditions:
          - condition: trigger
            id: motion_stale
          - condition: template
            value_template: "{{ stale_timeout > 0 }}"
        sequence:
          - alias: "Turn off stale lights"
            action: light.turn_off
            target: !input light_target
            data: >
              {{ {'transition': turn_off_transition} if use_transitions else {} }}
          - delay:
              seconds: 5
          - alias: "Turn off stale lights (retry)"
            action: light.turn_off
            target: !input light_target
            data: >
              {{ {'transition': turn_off_transition} if use_transitions else {} }}
